services:
  - type: web
    name: modelcompare
    runtime: node
    repo: https://github.com/karthikk022/modelcompare
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: modelcompare
          property: host
